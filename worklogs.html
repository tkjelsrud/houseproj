<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husprosjekt — Arbeidslogg</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container d-flex align-items-center gap-3">
      <a class="navbar-brand me-2" href="dashboard.html">Husprosjekt</a>
      <a class="nav-link" href="dashboard.html">Oversikt</a>
      <a class="nav-link" href="expenses.html">Utgifter</a>
      <a class="nav-link active" href="worklogs.html">Arbeidslogg</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="text-white-50 small d-none d-sm-inline" id="user-email"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm">Logg ut</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Registrer timer -->
    <div class="card form-card mb-4">
      <div class="card-body">
        <h2 class="section-title">Registrer arbeidstimer</h2>
        <form id="worklog-form" novalidate>
          <div class="row g-2">
            <div class="col-6 col-md-2">
              <label for="wl-date" class="form-label">Dato</label>
              <input type="date" id="wl-date" class="form-control" required />
            </div>
            <div class="col-6 col-md-3">
              <label for="wl-contractor" class="form-label">Håndverker</label>
              <input type="text" id="wl-contractor" class="form-control" placeholder="Navn" required />
            </div>
            <div class="col-4 col-md-2">
              <label for="wl-hours" class="form-label">Timer</label>
              <input type="number" id="wl-hours" class="form-control" min="0" step="0.5" placeholder="0" required />
            </div>
            <div class="col-4 col-md-1">
              <label for="wl-people" class="form-label">Pers.</label>
              <input type="number" id="wl-people" class="form-control" min="1" step="1" value="1" required />
            </div>
            <div class="col-4 col-md-2">
              <label for="wl-rate" class="form-label">Sats (kr/t)</label>
              <input type="number" id="wl-rate" class="form-control" min="0" step="1" placeholder="0" required />
            </div>
            <div class="col-12 col-md-3">
              <label for="wl-desc" class="form-label">Beskrivelse av arbeid</label>
              <input type="text" id="wl-desc" class="form-control" placeholder="Hva ble gjort?" />
            </div>
            <div class="col-12 col-sm-auto ms-sm-auto">
              <button type="submit" id="wl-submit" class="btn btn-primary w-100">Legg til</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Arbeidslogg liste -->
    <div class="card">
      <div class="card-body">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
          <h2 class="section-title mb-0">Arbeidslogg</h2>
          <div class="d-flex align-items-center gap-2">
            <select id="filter-contractor" class="form-select form-select-sm" style="width:auto">
              <option value="">Alle håndverkere</option>
            </select>
            <span id="worklog-total" class="text-muted small fw-semibold"></span>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Dato</th>
                <th>Håndverker</th>
                <th>Timer</th>
                <th>Sats</th>
                <th>Kostnad</th>
                <th>Oppgave</th>
              </tr>
            </thead>
            <tbody id="worklog-tbody">
              <tr><td colspan="6" class="text-muted text-center">Laster…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { logout } from './js/auth.js';
    import './js/worklogs.js';
    document.getElementById('logout-btn').addEventListener('click', logout);
  </script>
</body>
</html>
