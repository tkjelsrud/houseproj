<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Husprosjekt — Utgifter</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <nav class="navbar navbar-dark">
    <div class="container d-flex align-items-center gap-3">
      <a class="navbar-brand me-2" href="dashboard.html">Husprosjekt</a>
      <a class="nav-link" href="dashboard.html">Oversikt</a>
      <a class="nav-link active" href="expenses.html">Utgifter</a>
      <a class="nav-link" href="worklogs.html">Arbeidslogg</a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <span class="text-white-50 small d-none d-sm-inline" id="user-email"></span>
        <button id="logout-btn" class="btn btn-outline-light btn-sm">Logg ut</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">

    <!-- Legg til utgift -->
    <div class="card form-card mb-4">
      <div class="card-body">
        <h2 class="section-title">Legg til utgift</h2>
        <form id="expense-form" novalidate>
          <div class="row g-2">
            <div class="col-6 col-md-3">
              <label for="exp-date" class="form-label">Dato</label>
              <input type="date" id="exp-date" class="form-control" required />
            </div>
            <div class="col-6 col-md-3">
              <label for="exp-amount" class="form-label">Beløp (kr)</label>
              <input type="number" id="exp-amount" class="form-control" min="0" step="1" placeholder="0" required />
            </div>
            <div class="col-12 col-md-3">
              <label for="exp-category" class="form-label">Kategori</label>
              <select id="exp-category" class="form-select" required>
                <option value="">Velg kategori</option>
              </select>
              <input type="text" id="exp-category-new" class="form-control mt-1 d-none" placeholder="Navn på ny kategori" />
            </div>
            <div class="col-12 col-md-3">
              <label for="exp-supplier" class="form-label">Leverandør / Håndverker</label>
              <input type="text" id="exp-supplier" class="form-control" list="supplier-list" placeholder="Navn" />
              <datalist id="supplier-list"></datalist>
            </div>
            <div class="col-12">
              <label for="exp-desc" class="form-label">Beskrivelse</label>
              <input type="text" id="exp-desc" class="form-control" placeholder="Hva ble kjøpt?" />
            </div>

            <!-- Vis mer -->
            <div class="col-12">
              <button type="button" id="vis-mer-btn" class="btn btn-link btn-sm px-0 text-muted">▸ Vis mer</button>
            </div>
            <div id="vis-mer-fields" class="col-12 d-none">
              <div class="row g-2 align-items-end">
                <div class="col-12 col-md-4">
                  <label for="exp-purchased-by" class="form-label">Kjøpt av</label>
                  <input type="text" id="exp-purchased-by" class="form-control" list="members-list" placeholder="Navn" />
                  <datalist id="members-list"></datalist>
                </div>
                <div class="col-12 col-md-4 pb-2">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="exp-allocated" />
                    <label class="form-check-label" for="exp-allocated">
                      Allokert <span class="text-muted small">(planlagt, ikke talt i totalt)</span>
                    </label>
                  </div>
                  <div class="form-check mt-1">
                    <input class="form-check-input" type="checkbox" id="exp-transfer" />
                    <label class="form-check-label" for="exp-transfer">
                      Overføring <span class="text-muted small">(oppgjør mellom personer, skjult fra liste)</span>
                    </label>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 col-sm-auto ms-sm-auto">
              <button type="submit" id="exp-submit" class="btn btn-primary w-100">Legg til utgift</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <!-- Utgiftsliste -->
    <div class="card">
      <div class="card-body">
        <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
          <h2 class="section-title mb-0">Utgiftslogg</h2>
          <div class="d-flex align-items-center gap-2">
            <select id="filter-category" class="form-select form-select-sm" style="width:auto">
              <option value="">Alle kategorier</option>
            </select>
            <span id="expense-total" class="text-muted small fw-semibold"></span>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table table-sm table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Dato</th>
                <th>Beløp</th>
                <th>Kategori</th>
                <th>Leverandør</th>
                <th>Beskrivelse</th>
                <th>Kjøpt av</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="expense-tbody">
              <tr><td colspan="7" class="text-muted text-center">Laster…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { logout } from './js/auth.js';
    import './js/expenses.js';
    document.getElementById('logout-btn').addEventListener('click', logout);
  </script>
</body>
</html>
